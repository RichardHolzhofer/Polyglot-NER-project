version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Optional: Mount local models for "Local-First" override support
      - ./final_model:/app/final_model
      # Cache for HuggingFace model download so it persists across runs
      - huggingface_cache:/root/.cache/huggingface
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # Streamlit Frontend
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: always

volumes:
  huggingface_cache:
